<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <rect width="800" height="250" rx="12" fill="#161B22" stroke="#FF0000" stroke-width="1.5"/>
  <circle cx="28" cy="22" r="6" fill="#FF5F56"/>
  <circle cx="48" cy="22" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="22" r="6" fill="#27C93F"/>
  <text x="350" y="22" fill="#666" font-family="monospace" font-size="13" text-anchor="middle">ezague@github ~ </text>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#333" stroke-width="1"/>

  <!-- Clip paths with SMIL animations -->
  <clipPath id="c1">
    <rect x="30" y="55" width="0" height="30">
      <animate attributeName="width" from="0" to="280" begin="0.5s" dur="1.5s" fill="freeze" calcMode="discrete" keyTimes="0;0.05;0.1;0.15;0.2;0.25;0.3;0.35;0.4;0.45;0.5;0.55;0.6;0.65;0.7;0.75;0.8;0.85;0.9;0.95;1" values="0;14;28;42;56;70;84;98;112;126;140;154;168;182;196;210;224;238;252;266;280"/>
    </rect>
  </clipPath>
  <clipPath id="c2">
    <rect x="30" y="100" width="0" height="30">
      <animate attributeName="width" from="0" to="370" begin="2.5s" dur="2s" fill="freeze" calcMode="discrete" keyTimes="0;0.05;0.1;0.15;0.2;0.25;0.3;0.35;0.4;0.45;0.5;0.55;0.6;0.65;0.7;0.75;0.8;0.85;0.9;0.95;1" values="0;18.5;37;55.5;74;92.5;111;129.5;148;166.5;185;203.5;222;240.5;259;277.5;296;314.5;333;351.5;370"/>
    </rect>
  </clipPath>
  <clipPath id="c3">
    <rect x="30" y="145" width="0" height="30">
      <animate attributeName="width" from="0" to="580" begin="5s" dur="2.5s" fill="freeze" calcMode="discrete" keyTimes="0;0.05;0.1;0.15;0.2;0.25;0.3;0.35;0.4;0.45;0.5;0.55;0.6;0.65;0.7;0.75;0.8;0.85;0.9;0.95;1" values="0;29;58;87;116;145;174;203;232;261;290;319;348;377;406;435;464;493;522;551;580"/>
    </rect>
  </clipPath>

  <text x="30" y="78" fill="#FF0000" font-family="monospace" font-size="18" font-weight="bold" clip-path="url(#c1)">$ whoami → Ezague</text>
  <text x="30" y="128" fill="#FF0000" font-family="monospace" font-size="18" clip-path="url(#c2)">$ location → Denmark</text>
  <text x="30" y="168" fill="#FF0000" font-family="monospace" font-size="18" clip-path="url(#c3)">$ stack → TypeScript | Python | SQL</text>

  <!-- Blinking cursor -->
  <rect x="340" y="155" width="10" height="20" fill="#FF0000" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.93;0.94;0.99;1" dur="7.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1;0;1;0;1" dur="1.4s" begin="7.5s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="215" fill="#444" font-family="monospace" font-size="12">Full Stack Developer · Building the web, one brick at a time.</text>
</svg>